<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script>
    function showDirectInput() {
      document.getElementById('directInputForm').style.display = 'block';
      document.getElementById('messageInputForm').style.display = 'none';
    }

    function showMessageInput() {
      document.getElementById('directInputForm').style.display = 'none';
      document.getElementById('messageInputForm').style.display = 'block';
    }

    function submitDirectInputForm() {
      var date = document.getElementById('date').value.split('-');
      var year = date[0];
      var month = date[1];
      var day = date[2];
      var stockName = document.getElementById('stockName').value;
      var stockAmount = document.getElementById('stockAmount').value;
      var dividendAmount = document.getElementById('dividendAmount').value;
      var broker2 = document.getElementById('broker2').value;
      var accountType2 = document.getElementById('accountType2').value;

      google.script.run.withSuccessHandler(closeDialog).addDividendDirect(
        year, month, day, stockName, stockAmount, dividendAmount, broker2, accountType2
      );
    }

    function submitMessageInputForm() {
      var date = document.getElementById('smsDate').value.split('-');
      var year = date[0];
      var month = date[1];
      var day = date[2];
      var message = document.getElementById('message').value;
      var brokerage = document.getElementById('brokerage').value;
      var accountDefinition = document.getElementById('accountDefinition').value;

      google.script.run.withSuccessHandler(closeDialog).addDividendFromMessage(
        year, month, day, message, brokerage, accountDefinition
      );
    }

    function closeDialog() {
      google.script.host.close();
    }

    function loadStockNames() {
      google.script.run.withSuccessHandler(function(names) {
        var select = document.getElementById('stockName');
        names.forEach(function(name) {
          var option = document.createElement('option');
          option.value = name;
          option.text = name;
          select.add(option);
        });
      }).getStockNames();
    }

    window.onload = function() {
      loadStockNames();
    }
  </script>
</head>
<body>
  <h3>배당금 입력</h3>
  <label><input type="radio" name="inputMode" onclick="showDirectInput()" checked> 직접입력</label>
  <label><input type="radio" name="inputMode" onclick="showMessageInput()"> 문자 메시지 입력</label>
  <br><br>

  <div id="directInputForm">
    <label for="date">날짜:</label>
    <input type="date" id="date" name="date"><br><br>

    <label for="stockName">종목명:</label>
    <select id="stockName" name="stockName"></select><br><br>

    <label for="stockAmount">주식 수:</label>
    <input type="number" step="0.01" id="stockAmount" name="stockAmount"><br><br>

    <label for="dividendAmount">배당금 총금액:</label>
    <input type="number" step="0.01" id="dividendAmount" name="dividendAmount"><br><br>

    <label for="accountType2">매수/매도 계좌:</label>
      <select id="accountType2" name="accountType2">
        <option value="연금저축">연금저축</option>
        <option value="ISA">ISA</option>
        <option value="IRP">IRP</option>
        <option value="일반계좌">일반계좌</option>
      </select><br><br>

    <label for="broker2">증권사:</label>
      <select id="broker2" name="broker2">
        <option value="삼성">삼성</option>
        <option value="토스">토스</option>
        <option value="NH">NH</option>
        <option value="신한">신한</option>
        <option value="이베스트">이베스트</option>
      </select><br><br>

    <input type="button" value="입력" onclick="submitDirectInputForm()">
  </div>

  <div id="messageInputForm" style="display:none">
    <label for="smsDate">날짜:</label>
        <input type="date" id="smsDate" name="smsDate"><br><br>

    <label for="brokerage">증권사:</label>
    <select id="brokerage" name="brokerage">
      <option value="samsung">삼성증권</option>
      <option value="nh">NH증권</option>
      <option value="shinhanc">신한증권</option>
      <option value="toss">Toss증권</option>
      <option value="kiwoom">키움증권</option>
    </select><br><br>

    <label for="accountDefinition">매수/매도 계좌:</label>
    <select id="accountDefinition" name="accountDefinition">
      <option value="연금저축">연금저축</option>
      <option value="ISA">ISA</option>
      <option value="IRP">IRP</option>
      <option value="일반계좌">일반계좌</option>
    </select><br><br>

    <label for="message">문자 메시지 입력:</label>
    <textarea id="message" name="message" rows="4" cols="50"></textarea><br><br>

    <input type="button" value="입력" onclick="submitMessageInputForm()">
  </div>
</body>
</html>
