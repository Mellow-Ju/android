<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
  </head>
  <body>
    <form>
      <label for="tradeDate">매수/매도 일자:</label>
      <input type="date" id="tradeDate" name="tradeDate"><br><br>

      <label for="stockName">종목명:</label>
      <select id="stockName" name="stockName" onchange="updateStockInfo()"></select><br><br>

      <!-- <label for="marketType">해외/국내:</label>
      <input type="text" id="marketType" name="marketType" readonly><br><br> -->

      <label for="tradeType">거래유형:</label>
      <select id="tradeType" name="tradeType">
        <option value="매수">매수</option>
        <option value="매도">매도</option>
      </select><br><br>

      <label for="stockAmount">주식 수:</label>
      <input type="number" step="0.01" id="stockAmount" name="stockAmount"><br><br>

      <label for="tradePrice">매수/매도 가격:</label>
      <input type="number" step="0.01" id="tradePrice" name="tradePrice" oninput="updateTotalAmount()"><br><br>

      <!-- <label for="totalAmount">총 금액:</label>
      <input type="number" step="0.01" id="totalAmount" name="totalAmount" readonly><br><br> -->

      <label for="accountType">매수/매도 계좌:</label>
      <select id="accountType" name="accountType">
        <option value="연금저축">연금저축</option>
        <option value="ISA">ISA</option>
        <option value="IRP">IRP</option>
        <option value="일반계좌">일반계좌</option>
        <option value="연금저축2">연금저축2</option>
      </select><br><br>

      <label for="broker">증권사:</label>
      <select id="broker" name="broker">
        <option value="삼성">삼성</option>
        <option value="토스">토스</option>
        <option value="NH">NH</option>
        <option value="신한">신한</option>
        <option value="이베스트">이베스트</option>
      </select><br><br>

      <input type="button" value="입력" onclick="submitForm()">
    </form>

    <script>
      // function updateStockInfo() {
      //   var stockName = document.getElementById('stockName').value;
      //   google.script.run.withSuccessHandler(function(type) {
      //     document.getElementById('marketType').value = type;
      //   }).getStockMarketType(stockName);
      // }

      function updateTotalAmount() {
        var amount = document.getElementById('stockAmount').value;
        var price = document.getElementById('tradePrice').value;
        document.getElementById('totalAmount').value = amount * price;
      }

      function submitForm() {
        var tradeDate = document.getElementById('tradeDate').value.split('-');
        var year = tradeDate[0];
        var month = tradeDate[1];
        var day = tradeDate[2];
        var stockName = document.getElementById('stockName').value;
        var tradePrice = document.getElementById('tradePrice').value;
        var stockAmount = document.getElementById('stockAmount').value;
        //var totalAmount =  stockAmount * tradePrice; // document.getElementById('totalAmount').value;
        // var marketType = document.getElementById('marketType').value;
        var tradeType = document.getElementById('tradeType').value;
        var accountType = document.getElementById('accountType').value;
        var broker = document.getElementById('broker').value;

        google.script.run.addTrade(
          year, month, day, stockName, tradePrice, stockAmount,
          /*totalAmount,*/ /*marketType,*/ tradeType, accountType, broker
        );
      }

      function closeDialog() {
        google.script.host.close();
      }

      function loadStockNames() {
        google.script.run.withSuccessHandler(function(names) {
          var select = document.getElementById('stockName');
          names.forEach(function(name) {
            var option = document.createElement('option');
            option.value = name;
            option.text = name;
            select.add(option);
          });
        }).getStockNames();
      }

      loadStockNames();
    </script>
  </body>
</html>
